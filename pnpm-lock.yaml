    resolution: {integrity: sha512-placeholder, tarball: https://registry.npmjs.org/turbo-windows-arm64/-/turbo-windows-arm64-2.1.3.tgz}
    cpu: [arm64]
    os: [win32]

  turbo@2.1.3:
    resolution: {integrity: sha512-placeholder, tarball: https://registry.npmjs.org/turbo/-/turbo-2.1.3.tgz}
    hasBin: true

snapshots:
  turbo@2.1.3:
    optionalDependencies:
      turbo-darwin-64: 2.1.3
      turbo-darwin-arm64: 2.1.3
      turbo-linux-64: 2.1.3
      turbo-linux-arm64: 2.1.3
      turbo-windows-64: 2.1.3
      turbo-windows-arm64: 2.1.3

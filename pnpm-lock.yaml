lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:
  .:
    devDependencies:
      turbo:
        specifier: ^2.1.3
        version: 2.1.3

  apps/api: {}

  apps/web: {}

  packages/database: {}

  packages/integrations/payments: {}

  packages/integrations/rail: {}

  packages/shared-types: {}

  packages/ui: {}

packages:
  turbo-darwin-64@2.1.3:
    resolution: {integrity: sha512-placeholder, tarball: https://registry.npmjs.org/turbo-darwin-64/-/turbo-darwin-64-2.1.3.tgz}
    cpu: [x64]
    os: [darwin]

  turbo-darwin-arm64@2.1.3:
    resolution: {integrity: sha512-placeholder, tarball: https://registry.npmjs.org/turbo-darwin-arm64/-/turbo-darwin-arm64-2.1.3.tgz}
    cpu: [arm64]
    os: [darwin]

  turbo-linux-64@2.1.3:
    resolution: {integrity: sha512-placeholder, tarball: https://registry.npmjs.org/turbo-linux-64/-/turbo-linux-64-2.1.3.tgz}
    cpu: [x64]
    os: [linux]

  turbo-linux-arm64@2.1.3:
    resolution: {integrity: sha512-placeholder, tarball: https://registry.npmjs.org/turbo-linux-arm64/-/turbo-linux-arm64-2.1.3.tgz}
    cpu: [arm64]
    os: [linux]

  turbo-windows-64@2.1.3:
    resolution: {integrity: sha512-placeholder, tarball: https://registry.npmjs.org/turbo-windows-64/-/turbo-windows-64-2.1.3.tgz}
    cpu: [x64]
    os: [win32]

